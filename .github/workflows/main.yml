name: CI-CD Pipeline
on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
    # ✅ Step 1: Git clone
    - name: Checkout code
      uses: actions/checkout@v3

    # ✅ Step 2: Set up Python (for flake8)
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    # ✅ Step 3: Install flake8
    - name: Install flake8
      run: |
        pip install flake8

    # ✅ Step 4: Run flake8
    - name: Run flake8
      run: |
        flake8 . --ignore=E501

    # ✅ Step 5: Setup Node (for ESLint)
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    # ✅ Step 6: Install ESLint
    - name: Install ESLint
      run: |
        npm install eslint

    # ✅ Step 7: Run ESLint
    - name: Run ESLint
      run: |
        npx eslint . || true  

    - name: Install OpenShift CLI
      run: |
        curl -LO https://mirror.openshift.com/pub/openshift-v4/clients/oc/latest/linux/oc.tar.gz
        tar -xvf oc.tar.gz
        sudo mv oc /usr/local/bin/
        oc version
      
    # ✅ Step 15: Deploy application
    
    - name: Deploy to OpenShift
      run: |
        oc login ${{ secrets.OPENSHIFT_SERVER }} \
        --token=${{ secrets.OPENSHIFT_TOKEN }} \
        --insecure-skip-tls-verify=true
        oc project ${{ secrets.OPENSHIFT_PROJECT }}
        oc apply -f deployment.yaml

    # ✅ Step 16: Verify rollout
    - name: Verify Deployment
      run: |
        oc rollout status deployment/my-app
