name: CI-CD Pipeline
on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
    # ✅ Step 1: Git clone
    - name: Checkout code
      uses: actions/checkout@v3

    # ✅ Step 2: Set up Python (for flake8)
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    # ✅ Step 3: Install flake8
    - name: Install flake8
      run: |
        pip install flake8

    # ✅ Step 4: Run flake8
    - name: Run flake8
      run: |
        flake8 . --ignore=E501

    # ✅ Step 5: Setup Node (for ESLint)
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    # ✅ Step 6: Install ESLint
    - name: Install ESLint
      run: |
        npm install eslint

    # ✅ Step 7: Run ESLint
    - name: Run ESLint
      run: |
        npx eslint . || true

    # ✅ Step 8: Install Buildah
    - name: Install Buildah
      run: |
        sudo apt-get update
        sudo apt-get install -y buildah

    # ✅ Step 9: Build container image using Buildah
    - name: Build image
      run: |
        buildah bud -t my-app-image:latest .

    # ✅ Step 10: Login to container registry
    - name: Login to registry
      run: |
        buildah login -u ${{ secrets.REGISTRY_USER }} -p ${{ secrets.REGISTRY_PASSWORD }} ${{ secrets.REGISTRY_URL }}

    # ✅ Step 11: Push image
    - name: Push image
      run: |
        buildah push my-app-image:latest ${{ secrets.REGISTRY_URL }}/my-app-image:latest

    # ✅ Step 12: Install OpenShift CLI
    - name: Install oc CLI
      run: |
        curl -LO https://mirror.openshift.com/pub/openshift-v4/clients/oc/latest/linux/oc.tar.gz
        tar -xvf oc.tar.gz
        sudo mv oc /usr/local/bin/

    # ✅ Step 13: Login to OpenShift
    - name: OpenShift Login
      run: |
        oc login ${{ secrets.OPENSHIFT_SERVER }} \
        --token=${{ secrets.OPENSHIFT_TOKEN }} \
        --insecure-skip-tls-verify=true

    # ✅ Step 14: Select project
    - name: Select project
      run: |
        oc project ${{ secrets.OPENSHIFT_PROJECT }}

    # ✅ Step 15: Deploy application
    - name: Deploy to OpenShift
      run: |
        oc apply -f deployment.yaml

    # ✅ Step 16: Verify rollout
    - name: Verify Deployment
      run: |
        oc rollout status deployment/my-app
